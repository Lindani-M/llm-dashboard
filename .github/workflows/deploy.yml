name: Provision & Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_REGION: southafricanorth
  RG: ai-rg
  AZURE_SUBSCRIPTION_ID: 6421aba4-c9b5-4354-bf2a-ef86b1623d21
  PYTHON_VERSION: '3.11'

jobs:
  provision-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Azure Login ────────────────────────────────────────────────────
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: >-
            {"clientId":"${{ secrets.SP_CLIENT_ID }}",
             "clientSecret":"${{ secrets.SP_CLIENT_SECRET }}",
             "subscriptionId":"${{ env.AZURE_SUBSCRIPTION_ID }}",
             "tenantId":"${{ secrets.SP_TENANT_ID }}"}

      # ── 3. Infrastructure (idempotent) ────────────────────────────────────
      - name: Create Storage Account
        run: |
          STORAGE=$(echo "${{ secrets.AZURE_WEBAPP_NAME }}" \
            | tr -cd '[:alnum:]' | tr '[:upper:]' '[:lower:]' | cut -c1-20)st
          echo "STORAGE_ACCOUNT=$STORAGE" >> $GITHUB_ENV
          az storage account create \
            --name "$STORAGE" \
            --resource-group "${{ env.RG }}" \
            --sku Standard_LRS \
            --allow-blob-public-access false \
            --output none

      - name: Get storage connection string
        run: |
          CONN=$(az storage account show-connection-string \
            --name "${{ env.STORAGE_ACCOUNT }}" \
            --resource-group "${{ env.RG }}" \
            --query connectionString -o tsv)
          echo "::add-mask::$CONN"
          echo "STORAGE_CONN=$CONN" >> $GITHUB_ENV

      - name: Create commentary blob container
        run: |
          az storage container create \
            --name commentary \
            --connection-string "${{ env.STORAGE_CONN }}" \
            --output none

      - name: Create App Service Plan
        run: |
          if ! az appservice plan show \
               --name "${{ secrets.AZURE_WEBAPP_NAME }}-plan" \
               --resource-group "${{ env.RG }}" \
               --output none 2>/dev/null; then
            az appservice plan create \
              --name "${{ secrets.AZURE_WEBAPP_NAME }}-plan" \
              --resource-group "${{ env.RG }}" \
              --sku B1 \
              --is-linux \
              --output none
          fi

      - name: Create Web App
        run: |
          if ! az webapp show \
               --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
               --resource-group "${{ env.RG }}" \
               --output none 2>/dev/null; then
            az webapp create \
              --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
              --resource-group "${{ env.RG }}" \
              --plan "${{ secrets.AZURE_WEBAPP_NAME }}-plan" \
              --runtime "PYTHON|3.11" \
              --output none
          fi

      # ── 4. Configure App Service settings ────────────────────────────────
      - name: Configure App Service settings
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          resource-group-name: ${{ env.RG }}
          app-settings-json: |
            [
              { "name": "SCM_DO_BUILD_DURING_DEPLOYMENT", "value": "true", "slotSetting": false },
              { "name": "ENABLE_ORYX_BUILD",              "value": "true", "slotSetting": false },
              { "name": "WEBSITES_PORT",                  "value": "8000", "slotSetting": false },
              { "name": "SP_TENANT_ID",       "value": "${{ secrets.SP_TENANT_ID }}",       "slotSetting": false },
              { "name": "SP_CLIENT_ID",       "value": "${{ secrets.SP_CLIENT_ID }}",       "slotSetting": false },
              { "name": "SP_CLIENT_SECRET",   "value": "${{ secrets.SP_CLIENT_SECRET }}",   "slotSetting": false },
              { "name": "SP_FILE_SHARE_URL",  "value": "${{ secrets.SP_FILE_SHARE_URL }}",  "slotSetting": false },
              { "name": "CLAUDE_ENDPOINT",    "value": "${{ secrets.CLAUDE_ENDPOINT }}",    "slotSetting": false },
              { "name": "CLAUDE_API_KEY",     "value": "${{ secrets.CLAUDE_API_KEY }}",     "slotSetting": false },
              { "name": "CLAUDE_DEPLOYMENT_NAME", "value": "${{ secrets.CLAUDE_DEPLOYMENT_NAME }}", "slotSetting": false },
              { "name": "AZURE_STORAGE_CONNECTION_STRING", "value": "${{ env.STORAGE_CONN }}", "slotSetting": false },
              { "name": "AZURE_STORAGE_CONTAINER", "value": "commentary", "slotSetting": false }
            ]

      - name: Set startup command
        run: |
          az webapp config set \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ env.RG }}" \
            --startup-file "python -m uvicorn main:app --host 0.0.0.0 --port 8000" \
            --output none

      # ── 5. Build React frontend ───────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: npm ci && npm run build
        working-directory: frontend

      - name: Copy build into backend/static
        run: |
          rm -rf backend/static
          cp -r frontend/dist backend/static

      # ── 6. Package & Deploy ───────────────────────────────────────────────
      - name: Create deployment zip
        run: |
          cd backend
          zip -r ../deploy.zip . \
            --exclude "*.pyc" \
            --exclude "*__pycache__*" \
            --exclude ".venv/*" \
            --exclude ".python_packages/*"

      - name: Deploy to Azure App Service
        run: |
          az webapp deploy \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ env.RG }}" \
            --src-path deploy.zip \
            --type zip \
            --async false
