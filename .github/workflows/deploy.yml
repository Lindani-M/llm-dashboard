name: Provision & Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_REGION: southafricanorth
  RG: ai-rg
  AZURE_SUBSCRIPTION_ID: 6421aba4-c9b5-4354-bf2a-ef86b1623d21
  PYTHON_VERSION: '3.11'
  # Populated at runtime via $GITHUB_ENV — declared here to satisfy the linter
  STORAGE_ACCOUNT: ''
  STORAGE_CONN: ''
  ACR_NAME: ''
  ACR_URL: ''
  ACR_USER: ''
  ACR_PASS: ''
  IMAGE: ''

jobs:
  provision-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Azure Login ────────────────────────────────────────────────────
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: >-
            {"clientId":"${{ secrets.SP_CLIENT_ID }}",
             "clientSecret":"${{ secrets.SP_CLIENT_SECRET }}",
             "subscriptionId":"${{ env.AZURE_SUBSCRIPTION_ID }}",
             "tenantId":"${{ secrets.SP_TENANT_ID }}"}

      # ── 3. Infrastructure (idempotent) ────────────────────────────────────
      - name: Create Storage Account
        run: |
          STORAGE=$(echo "${{ secrets.AZURE_WEBAPP_NAME }}" \
            | tr -cd '[:alnum:]' | tr '[:upper:]' '[:lower:]' | cut -c1-20)st
          echo "STORAGE_ACCOUNT=$STORAGE" >> $GITHUB_ENV
          az storage account create \
            --name "$STORAGE" \
            --resource-group "${{ env.RG }}" \
            --sku Standard_LRS \
            --allow-blob-public-access false \
            --output none

      - name: Get storage connection string
        run: |
          CONN=$(az storage account show-connection-string \
            --name "${{ env.STORAGE_ACCOUNT }}" \
            --resource-group "${{ env.RG }}" \
            --query connectionString -o tsv)
          echo "::add-mask::$CONN"
          echo "STORAGE_CONN=$CONN" >> $GITHUB_ENV

      - name: Create commentary blob container
        run: |
          az storage container create \
            --name commentary \
            --connection-string "${{ env.STORAGE_CONN }}" \
            --output none

      - name: Create App Service Plan
        run: |
          if ! az appservice plan show \
               --name "${{ secrets.AZURE_WEBAPP_NAME }}-plan" \
               --resource-group "${{ env.RG }}" \
               --output none 2>/dev/null; then
            az appservice plan create \
              --name "${{ secrets.AZURE_WEBAPP_NAME }}-plan" \
              --resource-group "${{ env.RG }}" \
              --sku B1 \
              --is-linux \
              --output none
          fi

      - name: Create Web App
        run: |
          if ! az webapp show \
               --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
               --resource-group "${{ env.RG }}" \
               --output none 2>/dev/null; then
            az webapp create \
              --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
              --resource-group "${{ env.RG }}" \
              --plan "${{ secrets.AZURE_WEBAPP_NAME }}-plan" \
              --deployment-container-image-name "mcr.microsoft.com/appsvc/staticsite:latest" \
              --output none
          fi

      # ── 4. Create ACR (idempotent) ────────────────────────────────────────
      - name: Register ContainerRegistry provider
        run: |
          az provider register --namespace Microsoft.ContainerRegistry --wait

      - name: Create Container Registry
        run: |
          ACR=$(echo "${{ secrets.AZURE_WEBAPP_NAME }}" \
            | tr -cd '[:alnum:]' | tr '[:upper:]' '[:lower:]' | cut -c1-20)acr
          echo "ACR_NAME=$ACR" >> $GITHUB_ENV
          az acr create \
            --name "$ACR" \
            --resource-group "${{ env.RG }}" \
            --sku Basic \
            --admin-enabled true \
            --output none

      - name: Get ACR credentials
        run: |
          ACR_URL="${{ env.ACR_NAME }}.azurecr.io"
          ACR_USER=$(az acr credential show --name "${{ env.ACR_NAME }}" --query username -o tsv)
          ACR_PASS=$(az acr credential show --name "${{ env.ACR_NAME }}" --query "passwords[0].value" -o tsv)
          echo "::add-mask::$ACR_PASS"
          echo "ACR_URL=$ACR_URL"   >> $GITHUB_ENV
          echo "ACR_USER=$ACR_USER" >> $GITHUB_ENV
          echo "ACR_PASS=$ACR_PASS" >> $GITHUB_ENV

      # ── 5. Configure App Service settings ────────────────────────────────
      - name: Configure App Service settings
        run: |
          az webapp config appsettings set \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ env.RG }}" \
            --settings \
              WEBSITES_PORT=8000 \
              SP_TENANT_ID="${{ secrets.SP_TENANT_ID }}" \
              SP_CLIENT_ID="${{ secrets.SP_CLIENT_ID }}" \
              SP_CLIENT_SECRET="${{ secrets.SP_CLIENT_SECRET }}" \
              SP_FILE_SHARE_URL="${{ secrets.SP_FILE_SHARE_URL }}" \
              CLAUDE_ENDPOINT="${{ secrets.CLAUDE_ENDPOINT }}" \
              CLAUDE_API_KEY="${{ secrets.CLAUDE_API_KEY }}" \
              CLAUDE_DEPLOYMENT_NAME="${{ secrets.CLAUDE_DEPLOYMENT_NAME }}" \
              AZURE_STORAGE_CONNECTION_STRING="${{ env.STORAGE_CONN }}" \
              AZURE_STORAGE_CONTAINER="commentary" \
            --output none

      # ── 6. Build React frontend ───────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: npm ci && npm run build
        working-directory: frontend

      - name: Copy build into backend/static
        run: |
          rm -rf backend/static
          cp -r frontend/dist backend/static

      # ── 7. Build & push Docker image ─────────────────────────────────────
      - name: Log in to ACR
        run: echo "${{ env.ACR_PASS }}" | docker login "${{ env.ACR_URL }}" -u "${{ env.ACR_USER }}" --password-stdin

      - name: Build and push image
        run: |
          IMAGE="${{ env.ACR_URL }}/${{ secrets.AZURE_WEBAPP_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE" backend/
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      # ── 8. Deploy container to App Service ───────────────────────────────
      - name: Configure App Service to use container
        run: |
          az webapp config container set \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ env.RG }}" \
            --container-image-name "${{ env.IMAGE }}" \
            --container-registry-url "https://${{ env.ACR_URL }}" \
            --container-registry-user "${{ env.ACR_USER }}" \
            --container-registry-password "${{ env.ACR_PASS }}" \
            --output none

      - name: Restart App Service
        run: |
          az webapp restart \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ env.RG }}" \
            --output none
